<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модерация • РетроФото</title>
    
    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ========== CSS VARIABLES (MUTED & ELEGANT) ========== */
        :root {
            /* Base Colors - Muted Slate/Cool Gray */
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb; /* Очень светлый серый */
            --bg-sidebar: #ffffff;
            --bg-hover: #f3f4f6;
            
            --text-primary: #1f2937; /* Темно-серый, не черный */
            --text-secondary: #6b7280; /* Спокойный серый */
            --text-muted: #9ca3af;
            
            --border-color: #e5e7eb;
            --border-light: #f3f4f6;

            /* Accents - Muted/Pastel */
            --accent-primary: #6366f1; /* Indigo (спокойный синий) */
            --accent-bg: #eef2ff;
            
            /* Status Colors - Muted & Stylish */
            --success: #059669;       /* Emerald 600 */
            --success-bg: #ecfdf5;    /* Очень светлый мятный */
            
            --danger: #dc2626;        /* Red 600 */
            --danger-bg: #fef2f2;     /* Очень светлый розовый */
            
            --warning: #d97706;       /* Amber 600 */
            --warning-bg: #fffbeb;    /* Очень светлый желтый */

            /* Shadows & Radius */
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.03);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        [data-theme="dark"] {
            --bg-primary: #111827;
            --bg-secondary: #0f172a;
            --bg-sidebar: #1f2937;
            --bg-hover: #374151;
            
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            
            --border-color: #374151;
            --border-light: #1f2937;

            --accent-primary: #818cf8;
            --accent-bg: #1e1b4b;
            
            --success: #34d399;
            --success-bg: #064e3b;
            
            --danger: #f87171;
            --danger-bg: #7f1d1d;
            
            --warning: #fbbf24;
            --warning-bg: #78350f;
        }

        /* ========== HIDE SCROLLBAR ========== */
        body::-webkit-scrollbar { width: 0px; background: transparent; }
        html { scrollbar-width: none; -ms-overflow-style: none; }

        /* ========== BASE ========== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Manrope', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.5;
            height: 100vh;
            overflow: hidden; /* Скроллим только контент */
            display: flex;
        }
        
        h1, h2, h3 { font-family: 'Inter', sans-serif; font-weight: 600; color: var(--text-primary); }
        a { text-decoration: none; color: inherit; }

        /* ========== SIDEBAR (LEFT NAV) ========== */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            flex-shrink: 0;
            z-index: 10;
        }

        .brand {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            color: var(--text-primary);
        }
        .brand i { color: var(--accent-primary); }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--accent-bg);
            color: var(--accent-primary);
            border-color: transparent;
        }
        
        .nav-item i { width: 20px; text-align: center; font-size: 16px; }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .theme-toggle:hover { border-color: var(--text-muted); }
        .theme-toggle .sun { display: none; }
        .theme-toggle .moon { display: block; }
        [data-theme="dark"] .theme-toggle .sun { display: block; }
        [data-theme="dark"] .theme-toggle .moon { display: none; }

        /* ========== MAIN CONTENT AREA ========== */
        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .top-bar {
            height: 64px;
            background: var(--bg-primary); /* Прозрачный или белый */
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            flex-shrink: 0;
        }
        
        .page-title { font-size: 20px; font-weight: 600; }
        
        .btn-back {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            transition: background 0.2s;
        }
        .btn-back:hover { background: var(--bg-hover); color: var(--text-primary); }

        /* Scrollable Content */
        .main-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
        }

        /* ========== STATS BAR ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); border-color: var(--text-muted); }
        
        .stat-icon {
            width: 42px; height: 42px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .stat-icon.pending { background: var(--warning-bg); color: var(--warning); }
        .stat-icon.approved { background: var(--success-bg); color: var(--success); }
        .stat-icon.rejected { background: var(--danger-bg); color: var(--danger); }
        
        .stat-info h4 { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .stat-value { font-size: 24px; font-weight: 700; color: var(--text-primary); font-family: 'Inter', sans-serif; }

        /* ========== FILTERS ========== */
        .filters-row {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .input-group {
            position: relative;
            flex: 1;
            min-width: 240px;
        }
        .input-group i {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 14px;
        }
        .form-input {
            width: 100%;
            padding: 10px 12px 10px 36px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-input:focus { border-color: var(--accent-primary); }
        
        .form-select {
            padding: 10px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }

        /* ========== PHOTO GRID ========== */
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
            border-color: var(--text-muted);
        }

        .card-img-wrap {
            position: relative;
            aspect-ratio: 4/3;
            background: var(--bg-secondary);
            overflow: hidden;
        }
        .card-img-wrap img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.4s ease;
        }
        .card:hover .card-img-wrap img { transform: scale(1.05); }

        .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; }
        
        .card-header {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 8px;
        }
        .year-badge {
            font-family: 'Inter', sans-serif;
            font-weight: 700; font-size: 18px; color: var(--text-primary);
        }
        .loc-name {
            font-size: 13px; color: var(--text-muted);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px;
        }

        .desc {
            font-size: 14px; color: var(--text-secondary);
            margin-bottom: 12px; line-height: 1.5;
            flex: 1;
        }

        .meta {
            display: flex; gap: 12px; font-size: 12px; color: var(--text-muted);
            margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border-light);
        }
        .meta span { display: flex; align-items: center; gap: 4px; }

        .actions { display: flex; gap: 8px; margin-top: auto; }
        
        .btn {
            flex: 1;
            padding: 8px 0;
            border: none; border-radius: var(--radius-sm);
            font-size: 13px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: filter 0.2s;
        }
        .btn-approve { background: var(--success-bg); color: var(--success); }
        .btn-approve:hover { filter: brightness(0.95); }
        .btn-reject { background: var(--danger-bg); color: var(--danger); }
        .btn-reject:hover { filter: brightness(0.95); }

        .comment-area {
            margin-top: 12px;
            width: 100%;
            padding: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 12px; color: var(--text-primary);
            resize: none; outline: none;
        }
        .comment-area:focus { border-color: var(--accent-primary); }

        /* ========== LOG TABLE ========== */
        .table-container {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th {
            text-align: left; padding: 12px 16px;
            background: var(--bg-secondary);
            color: var(--text-muted); font-weight: 600; font-size: 12px; text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
        }
        td {
            padding: 12px 16px; border-bottom: 1px solid var(--border-light);
            color: var(--text-secondary); vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--bg-secondary); }
        
        .thumb { width: 40px; height: 30px; border-radius: 4px; object-fit: cover; background: var(--bg-tertiary); }
        
        .status-pill {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 10px; border-radius: 99px;
            font-size: 12px; font-weight: 600;
        }
        .status-pill.ok { background: var(--success-bg); color: var(--success); }
        .status-pill.no { background: var(--danger-bg); color: var(--danger); }

        /* ========== SKELETON & EMPTY ========== */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state i { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
        
        .skeleton { background: linear-gradient(90deg, var(--bg-secondary) 25%, var(--bg-hover) 50%, var(--bg-secondary) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Toast */
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--bg-primary); border: 1px solid var(--border-color);
            padding: 12px 20px; border-radius: var(--radius-md);
            box-shadow: var(--shadow-md); z-index: 100;
            display: flex; align-items: center; gap: 10px;
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Mobile */
        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; overflow: auto; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border-color); padding: 12px; }
            .nav-menu { flex-direction: row; overflow-x: auto; padding-bottom: 4px; }
            .nav-item { white-space: nowrap; }
            .sidebar-footer { display: none; } /* Hide theme toggle on mobile header for space */
            .content-wrapper { height: auto; }
            .main-scroll { padding: 16px; overflow: visible; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="brand">
            <i class="fas fa-shield-alt"></i> Модерация
        </div>
        
        <nav class="nav-menu">
            <div class="nav-item active" onclick="switchTab('pending')">
                <i class="fas fa-layer-group"></i> На проверке
            </div>
            <div class="nav-item" onclick="switchTab('log')">
                <i class="fas fa-history"></i> Журнал действий
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="theme-toggle" id="themeToggle">
                <span id="themeLabel">Тема</span>
                <i class="fas fa-sun sun"></i>
                <i class="fas fa-moon moon"></i>
            </div>
            <div style="margin-top: 12px;">
                <a href="/" class="btn-back" style="display:inline-flex; width:100%; justify-content:center;">
                    <i class="fas fa-arrow-left"></i> На карту
                </a>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="content-wrapper">
        <header class="top-bar">
            <h2 class="page-title" id="pageTitle">Фотографии на проверке</h2>
        </header>

        <div class="main-scroll">
            
            <!-- SECTION: PENDING -->
            <section id="pending" class="section active">
                
                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon pending"><i class="fas fa-clock"></i></div>
                        <div class="stat-info">
                            <h4>Ожидают</h4>
                            <div class="stat-value" id="countPending">0</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon approved"><i class="fas fa-check"></i></div>
                        <div class="stat-info">
                            <h4>Одобрено</h4>
                            <div class="stat-value" id="countApproved">0</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon rejected"><i class="fas fa-times"></i></div>
                        <div class="stat-info">
                            <h4>Отклонено</h4>
                            <div class="stat-value" id="countRejected">0</div>
                        </div>
                    </div>
                </div>

                <!-- Filters -->
                <div class="filters-row">
                    <div class="input-group">
                        <i class="fas fa-search"></i>
                        <input type="text" class="form-input" id="searchInput" placeholder="Поиск по описанию, месту...">
                    </div>
                    <select class="form-select" id="sortFilter">
                        <option value="newest">Сначала новые</option>
                        <option value="oldest">Сначала старые</option>
                        <option value="year-desc">Год (сначала старые)</option>
                    </select>
                </div>

                <!-- Grid -->
                <div class="grid" id="photosContainer">
                    <!-- Skeletons -->
                    <div class="card"><div class="skeleton" style="height:200px;"></div><div style="padding:16px;"><div class="skeleton" style="height:20px;margin-bottom:10px;"></div><div class="skeleton" style="height:40px;"></div></div></div>
                    <div class="card"><div class="skeleton" style="height:200px;"></div><div style="padding:16px;"><div class="skeleton" style="height:20px;margin-bottom:10px;"></div><div class="skeleton" style="height:40px;"></div></div></div>
                </div>

                <div class="empty-state" id="emptyPending" style="display:none;">
                    <i class="fas fa-clipboard-check"></i>
                    <h3>Всё чисто!</h3>
                    <p>Нет фотографий, ожидающих проверки</p>
                </div>
            </section>

            <!-- SECTION: LOG -->
            <section id="log" class="section">
                <div class="filters-row">
                    <div class="input-group">
                        <i class="fas fa-search"></i>
                        <input type="text" class="form-input" id="logSearch" placeholder="Поиск в журнале...">
                    </div>
                    <select class="form-select" id="logStatusFilter">
                        <option value="">Все действия</option>
                        <option value="approved">Одобрено</option>
                        <option value="rejected">Отклонено</option>
                    </select>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th width="60">Фото</th>
                                <th>Локация / Год</th>
                                <th>Действие</th>
                                <th>Модератор</th>
                                <th>Дата</th>
                                <th>Комментарий</th>
                            </tr>
                        </thead>
                        <tbody id="logTableBody">
                            <!-- Skeleton Row -->
                            <tr>
                                <td><div class="skeleton" style="width:40px;height:30px;"></div></td>
                                <td><div class="skeleton" style="width:120px;height:16px;"></div></td>
                                <td><div class="skeleton" style="width:80px;height:24px;border-radius:12px;"></div></td>
                                <td><div class="skeleton" style="width:60px;height:16px;"></div></td>
                                <td><div class="skeleton" style="width:100px;height:16px;"></div></td>
                                <td><div class="skeleton" style="width:100%;height:16px;"></div></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div class="empty-state" id="emptyLog" style="display:none;">
                    <i class="fas fa-file-alt"></i>
                    <h3>Журнал пуст</h3>
                    <p>История действий пока пуста</p>
                </div>
            </section>

        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

<script>
    // --- THEME LOGIC ---
    const themeToggle = document.getElementById('themeToggle');
    const themeLabel = document.getElementById('themeLabel');
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    
    function setTheme(theme) {
        html.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        themeLabel.textContent = theme === 'dark' ? 'Dark Mode' : 'Light Mode';
    }
    setTheme(savedTheme);
    themeToggle.addEventListener('click', () => setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

    // --- TABS LOGIC ---
    function switchTab(tabId) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        
        document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');

        const title = document.getElementById('pageTitle');
        title.textContent = tabId === 'pending' ? 'Фотографии на проверке' : 'Журнал модерации';

        if (tabId === 'log' && !window.logLoaded) {
            loadLog();
            window.logLoaded = true;
        }
    }

    // --- API HELPERS ---
    function getCookie(name) {
        let v = null;
        if (document.cookie) document.cookie.split(';').forEach(c => { if(c.trim().startsWith(name+'=')) v = decodeURIComponent(c.split('=')[1]); });
        return v;
    }
    async function fetchJSON(url, opts = {}) {
    // Собираем заголовки: стандартный CSRF + переданные
    const headers = { 'X-CSRFToken': getCookie('csrftoken'), ...opts.headers };
    
    // Если есть тело и явно не указан Content-Type, ставим application/json
    if (opts.body && !headers['Content-Type']) {
        headers['Content-Type'] = 'application/json';
    }
    
    const r = await fetch(url, { ...opts, headers });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Ошибка');
    return d;
}
    function showToast(msg, type='success') {
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':'exclamation-circle'}" style="color:var(--${type==='success'?'success':'danger'})"></i> ${msg}`;
        document.getElementById('toastContainer').appendChild(t);
        setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(), 300); }, 3000);
    }
    function formatDate(iso) {
        if(!iso) return '—';
        return new Date(iso).toLocaleDateString('ru-RU', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
    }

    // --- PENDING PHOTOS LOGIC ---
    let allPhotos = [];
    const STATUS = { PENDING: 1, APPROVED: 2, REJECTED: 3 }; // Adjust based on your DB

    async function loadPending() {
        try {
            const data = await fetchJSON('/api/moderation/photos/');
            allPhotos = Array.isArray(data) ? data : (data.results || []);
            renderPending();
            updateStats();
        } catch(e) {
            document.getElementById('photosContainer').innerHTML = `<div class="empty-state">Ошибка загрузки: ${e.message}</div>`;
        }
    }

    function updateStats() {
        document.getElementById('countPending').textContent = allPhotos.filter(p => p.status === STATUS.PENDING).length;
        document.getElementById('countApproved').textContent = allPhotos.filter(p => p.status === STATUS.APPROVED).length;
        document.getElementById('countRejected').textContent = allPhotos.filter(p => p.status === STATUS.REJECTED).length;
    }

    function renderPending() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const sort = document.getElementById('sortFilter').value;
        
        let list = allPhotos.filter(p => p.status === STATUS.PENDING);
        if(search) list = list.filter(p => (p.description+p.location_name+p.owner_username).toLowerCase().includes(search));
        
        list.sort((a,b) => {
            if(sort==='oldest') return new Date(a.created_at) - new Date(b.created_at);
            if(sort==='year-desc') return (a.year||0) - (b.year||0);
            return new Date(b.created_at) - new Date(a.created_at);
        });

        const container = document.getElementById('photosContainer');
        const empty = document.getElementById('emptyPending');
        
        if(list.length === 0) {
            container.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';
        
        container.innerHTML = list.map(p => `
            <article class="card">
                <div class="card-img-wrap">
                    <img src="${p.image}" loading="lazy" alt="photo">
                </div>
                <div class="card-body">
                    <div class="card-header">
                        <span class="year-badge">${p.year}</span>
                        <span class="loc-name" title="${p.location_name}"><i class="fas fa-map-marker-alt"></i> ${p.location_name}</span>
                    </div>
                    <p class="desc">${p.description || 'Нет описания'}</p>
                    <div class="meta">
                        <span><i class="fas fa-user"></i> ${p.owner_username}</span>
                        <span><i class="far fa-clock"></i> ${formatDate(p.created_at)}</span>
                    </div>
                    <div class="actions">
                        <button class="btn btn-approve" onclick="actionPhoto(${p.id}, 'approve')">
                            <i class="fas fa-check"></i> Одобрить
                        </button>
                        <button class="btn btn-reject" onclick="actionPhoto(${p.id}, 'reject')">
                            <i class="fas fa-times"></i> Отклонить
                        </button>
                    </div>
                    <textarea class="comment-area" id="cmt-${p.id}" rows="1" placeholder="Комментарий (необязательно)"></textarea>
                </div>
            </article>
        `).join('');
    }

    async function actionPhoto(id, act) {
        const cmt = document.getElementById(`cmt-${id}`).value;
        if(act === 'reject' && !cmt && !confirm('Отклонить без причины?')) return;
        
        try {
            await fetchJSON(`/api/moderation/photos/${id}/${act}/`, {
                method: 'POST',
                body: JSON.stringify({ comment: cmt })
            });
            showToast(act === 'approve' ? 'Фото одобрено' : 'Фото отклонено', act === 'approve' ? 'success' : 'error');
            loadPending();
        } catch(e) { showToast(e.message, 'error'); }
    }

    // --- LOG LOGIC ---
    async function loadLog() {
        try {
            const data = await fetchJSON('/api/moderation/log/');
            renderLog(Array.isArray(data) ? data : []);
        } catch(e) {
            document.getElementById('logTableBody').innerHTML = `<tr><td colspan="6" class="empty-state">Ошибка: ${e.message}</td></tr>`;
        }
    }

    function renderLog(logs) {
        const search = document.getElementById('logSearch').value.toLowerCase();
        const status = document.getElementById('logStatusFilter').value;
        
        const filtered = logs.filter(l => {
            const matchText = (l.location_name+l.moderator+l.comment).toLowerCase().includes(search);
            const matchStatus = !status || l.action === status;
            return matchText && matchStatus;
        });

        const tbody = document.getElementById('logTableBody');
        if(filtered.length === 0) {
            tbody.innerHTML = '';
            document.getElementById('emptyLog').style.display = 'block';
            return;
        }
        document.getElementById('emptyLog').style.display = 'none';
        
        tbody.innerHTML = filtered.map(l => `
            <tr>
                <td><img src="${l.image}" class="thumb" onerror="this.style.display='none'"></td>
                <td>
                    <div style="font-weight:500;color:var(--text-primary)">${l.location_name}</div>
                    <div style="font-size:12px;color:var(--text-muted)">${l.year} г.</div>
                </td>
                <td>
                    <span class="status-pill ${l.action === 'approved' ? 'ok' : 'no'}">
                        ${l.action === 'approved' ? 'Одобрено' : 'Отклонено'}
                    </span>
                </td>
                <td>${l.moderator}</td>
                <td style="white-space:nowrap">${formatDate(l.reviewed_at)}</td>
                <td style="font-style:italic;color:var(--text-muted)">${l.comment || '—'}</td>
            </tr>
        `).join('');
    }

    // Listeners
    document.getElementById('searchInput').addEventListener('input', renderPending);
    document.getElementById('sortFilter').addEventListener('change', renderPending);
    document.getElementById('logSearch').addEventListener('input', () => loadLog()); // Simple re-filter
    document.getElementById('logStatusFilter').addEventListener('change', () => loadLog());

    // Init
    loadPending();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>РетроФото Ярославль</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

    <!-- Fonts & Icons for Modern Look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ========== MODERN VARIABLES ========== */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --accent-primary: #6366f1; /* Indigo */
            --accent-hover: #4f46e5;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-full: 9999px;
        }

        /* ========== BASE STYLES ========== */
        * { box-sizing: border-box; outline: none; }
        body { 
            margin: 0; padding: 0; 
            font-family: 'Manrope', 'Segoe UI', sans-serif; 
            color: var(--text-primary);
            background: var(--bg-secondary);
        }
        h1, h2, h3, h4 { font-family: 'Inter', sans-serif; }
        
        #map { height: 100vh; width: 100%; z-index: 1; }

        /* Hide Scrollbar but keep functionality */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* ========== SEARCH BAR (FLOATING) ========== */
        .osm-search-container {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        width: 400px;
        max-width: calc(100vw - 60px);
        transition: transform 0.3s ease;
        }
        

        .search-wrapper {
            background: var(--bg-primary);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            display: flex; align-items: center;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }
        .osm-search-input {
            border: none; padding: 12px 16px; width: 100%;
            font-size: 14px; color: var(--text-primary); background: transparent;
            font-family: inherit;
        }
        .osm-search-btn {
            background: transparent; border: none; border-left: 1px solid var(--border-color);
            padding: 0 16px; cursor: pointer; color: var(--text-secondary);
            height: 100%; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .osm-search-btn:hover { background: var(--bg-secondary); color: var(--accent-primary); }
        
        .osm-search-results {
            position: absolute; top: 110%; left: 0; right: 0;
            background: var(--bg-primary); border-radius: var(--radius-md);
            box-shadow: var(--shadow-md); max-height: 300px; overflow-y: auto;
            display: none; border: 1px solid var(--border-color);
        }
        .osm-result-item {
            padding: 12px 16px; cursor: pointer; font-size: 13px;
            border-bottom: 1px solid var(--border-color); line-height: 1.4;
        }
        .osm-result-item:last-child { border-bottom: none; }
        .osm-result-item:hover { background: var(--bg-secondary); }
        .osm-result-type { 
            font-size: 10px; text-transform: uppercase; color: var(--text-secondary); 
            margin-right: 6px; font-weight: 700; letter-spacing: 0.5px;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            position: fixed; top: 0; left: 0; width: min(clamp(320px, var(--sidebar-width, 360px), 760px), calc(100vw - 56px)); height: 100vh;
            background: var(--bg-primary);
            box-shadow: 4px 0 24px rgba(0,0,0,0.05);
            z-index: 1001; display: flex; flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid var(--border-color);
            overflow: visible;
        }
        .sidebar.hidden { transform: translateX(calc(-1 * min(clamp(320px, var(--sidebar-width, 360px), 760px), calc(100vw - 56px)))); }
        .sidebar-resizer {
            position: absolute; top: 0; right: -5px; width: 10px; height: 100%;
            cursor: ew-resize; z-index: 1003;
        }
        .sidebar-resizer::after {
            content: ''; position: absolute; top: 0; bottom: 0; left: 4px; width: 2px;
            background: transparent; transition: background 0.2s;
        }
        .sidebar-resizer:hover::after { background: var(--accent-primary); }
        
        .sidebar-toggle {
            position: absolute; top: 20px; right: -40px;
            width: 40px; height: 40px; background: var(--bg-primary);
            border: 1px solid var(--border-color); border-left: none;
            border-radius: 0 8px 8px 0;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-secondary);
            box-shadow: 4px 0 8px rgba(0,0,0,0.05);
            z-index: 1002; transition: all 0.2s;
        }
        .sidebar-toggle:hover { color: var(--accent-primary); }

        .sidebar-content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
            height: 100%;
            overflow: hidden;
            min-height: 0;
        }
        
        .sidebar-header {
            margin-bottom: 2px;
            font-size: 20px;
            font-weight: 700;
            line-height: 1.2;
        }
        .sidebar-header i { color: var(--accent-primary); }

        .sidebar-search { position: relative; z-index: 15; }
        .search-input-wrapper {
            display: flex; align-items: center; background: var(--bg-secondary);
            border-radius: var(--radius-sm); padding: 0 12px;
            border: 1px solid var(--border-color); transition: border-color 0.2s;
        }
        .search-input-wrapper:focus-within { border-color: var(--accent-primary); }
        .search-icon { font-size: 14px; color: var(--text-secondary); margin-right: 8px; }
        .search-input {
            border: none; outline: none; font-size: 14px; width: 100%;
            background: transparent; padding: 10px 0; color: var(--text-primary);
        }
        .search-results {
            display: none; position: absolute; top: 100%; left: 0; right: 0;
            background: var(--bg-primary); border-radius: var(--radius-sm);
            box-shadow: var(--shadow-md); max-height: 200px; overflow-y: auto;
            z-index: 10; margin-top: 5px; border: 1px solid var(--border-color);
        }
        .search-results.show { display: block; }
        .search-result-item {
            padding: 10px 14px; cursor: pointer; font-size: 13px;
            border-bottom: 1px solid var(--border-color);
        }
        .search-result-item:hover { background: var(--bg-secondary); color: var(--accent-primary); }
        .search-no-results { padding: 12px 14px; color: var(--text-secondary); font-style: italic; font-size: 13px; }

        .sidebar-filters {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
        }
        .sidebar-filter-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            min-width: 0;
        }
        .sidebar-filter-row.compact {
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto;
        }
        .sidebar-filter-row .form-control,
        .sidebar-filter-row .btn {
            min-width: 0;
        }
        .sidebar-section-title {
            margin: 0;
            font-size: 14px;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .photos-list {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 10px;
            padding-right: 6px;
            min-height: 0;
        }
        
        .photo-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0; /* Запрещаем карточке сжиматься */
        }
        .photo-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent-primary);
        }
        .photo-card img {
            width: 100%;
            height: 150px; /* Фиксированная высота, чтобы все были одинаковые */
            object-fit: cover; /* Обрезает лишнее, сохраняя пропорции */
            display: block;
        }
        .photo-card-info {
            padding: 12px;
        }
        .photo-card-year {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            color: var(--accent-primary);
            font-size: 14px;
            display: block;
            margin-bottom: 4px;
        }
        .photo-card-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.4;
            /* Красивое обрезание текста троеточием */
            display: -webkit-box;
            -webkit-line-clamp: 3; /* Максимум 3 строки */
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .no-photos { text-align: center; color: var(--text-secondary); margin-top: 30px; font-size: 14px; }

        /* ========== AUTH CONTAINER ========== */
        .auth-container {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
        }
        .btn-login {
            background: var(--bg-primary); border: 1px solid var(--border-color);
            padding: 8px 16px; border-radius: var(--radius-full);
            font-size: 14px; font-weight: 600; color: var(--text-primary);
            cursor: pointer; box-shadow: var(--shadow-sm);
            display: flex; align-items: center; gap: 8px;
            transition: all 0.2s;
        }
        .btn-login:hover { border-color: var(--accent-primary); color: var(--accent-primary); transform: translateY(-1px); }
        
        .user-info {
            display: flex; align-items: center; gap: 8px;
            background: var(--bg-primary); padding: 4px 4px 4px 12px;
            border-radius: var(--radius-full); border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }
        .user-avatar {
            width: 32px; height: 32px; background: var(--accent-primary); color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 14px;
        }
        .user-name {
            font-weight: 600; color: var(--text-primary); max-width: 120px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            font-size: 14px; cursor: pointer; background: none; border: none; padding: 0;
        }
        .user-name:hover { color: var(--accent-primary); }
        .btn-logout {
            background: none; border: none; cursor: pointer; font-size: 16px;
            padding: 6px; border-radius: 50%; color: var(--text-secondary);
            display: flex; align-items: center; justify-content: center;
        }
        .btn-logout:hover { background: #fef2f2; color: #dc2626; }

        /* ========== ADD PHOTO BUTTON ========== */
        .add-photo-btn {
            position: absolute; bottom: 30px; right: 30px; z-index: 1000;
            background: var(--accent-primary); color: white; border: none;
            border-radius: 50%; width: 56px; height: 56px;
            box-shadow: var(--shadow-md); font-size: 24px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .add-photo-btn:hover { transform: scale(1.1); background: var(--accent-hover); }

        /* ========== MODALS ========== */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            z-index: 2000; align-items: center; justify-content: center;
        }
        .modal-box {
            background: var(--bg-primary); padding: 24px;
            border-radius: var(--radius-lg); width: 400px; max-width: 90vw;
            box-shadow: var(--shadow-md); animation: fadeIn 0.3s ease;
            border: 1px solid var(--border-color);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .modal-box h3 { margin-top: 0; color: var(--text-primary); font-weight: 700; font-size: 20px; text-align: center; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: var(--text-secondary); font-size: 13px; }
        .form-control, .form-group input, .form-group textarea {
            width: 100%; padding: 10px 12px; background: var(--bg-secondary);
            border: 1px solid var(--border-color); border-radius: var(--radius-sm);
            font-size: 14px; color: var(--text-primary); font-family: inherit;
            transition: border-color 0.2s;
        }
        .form-control:focus, .form-group input:focus, .form-group textarea:focus {
            border-color: var(--accent-primary); background: var(--bg-primary);
        }
        
        .modal-actions { display: flex; justify-content: space-between; gap: 10px; margin-top: 20px; }
        .btn {
            padding: 10px 20px; border-radius: var(--radius-sm); border: none;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all 0.2s; font-family: inherit;
        }
        .btn-primary { background: var(--accent-primary); color: white; flex: 1; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--bg-secondary); color: var(--text-secondary); border: 1px solid var(--border-color); }
        .btn-secondary:hover { background: var(--border-color); color: var(--text-primary); }
        .btn-danger { background: #fef2f2; color: #dc2626; }
        .btn-danger:hover { background: #fee2e2; }

        .auth-tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--bg-secondary); padding: 4px; border-radius: var(--radius-sm); }
        .auth-tab {
            flex: 1; text-align: center; padding: 8px; font-size: 13px; font-weight: 600;
            cursor: pointer; border-radius: 4px; color: var(--text-secondary); transition: all 0.2s;
        }
        .auth-tab.active { background: var(--bg-primary); color: var(--accent-primary); shadow: var(--shadow-sm); }
        .error-message { color: #dc2626; font-size: 13px; margin-top: 5px; display: none; }

        /* ========== POPUPS & COMPARE ========== */
        .popup-content { min-width: 220px; text-align: center; font-size: 14px; font-family: 'Manrope', sans-serif; }
        .popup-img { max-width: 100%; height: auto; border-radius: 6px; margin-bottom: 5px; display: block; }
        
        .btn-add, .btn-compare {
            display: inline-block; padding: 8px 14px; color: white;
            text-decoration: none; border-radius: 6px; cursor: pointer;
            margin-top: 8px; font-size: 13px; font-weight: 600; border: none;
        }
        .btn-add { background: var(--accent-primary); }
        .btn-add:hover { background: var(--accent-hover); }
        .btn-compare { background: #059669; margin-left: 5px; }
        .btn-compare:hover { background: #047857; }

        .popup-gallery { max-height: 230px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin: 8px 0; }
        .popup-gallery-item { border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .popup-year { font-weight: bold; font-size: 13px; color: var(--accent-primary); margin-top: 3px; }
        .popup-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

        .location-photos-modal .modal-box {
            width: min(920px, 94vw);
            max-height: 88vh;
            padding: 0;
            overflow: hidden;
        }
        .location-photos-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
        }
        .location-photos-title { margin: 0; font-size: 20px; }
        .location-photos-subtitle { color: var(--text-secondary); font-size: 13px; margin-top: 4px; }
        .location-photos-grid {
            padding: 20px 24px 24px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
            max-height: calc(88vh - 92px);
            overflow-y: auto;
        }
        .location-photo-card {
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--bg-primary);
        }
        .location-photo-card img {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            display: block;
            background: #111;
        }
        .location-photo-info { padding: 12px; }
        .location-photo-year {
            color: var(--accent-primary);
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .location-photo-meta {
            color: var(--text-secondary);
            font-size: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 12px;
            margin-top: 8px;
        }
        .modal-icon-close {
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 18px;
        }

        .photo-viewer-modal .modal-box {
            width: min(1040px, 94vw);
            max-height: 92vh;
            padding: 0;
            overflow: hidden;
        }
        .photo-viewer-layout {
            display: grid;
            grid-template-columns: minmax(0, 1.45fr) minmax(280px, 0.75fr);
            max-height: 92vh;
        }
        .photo-viewer-media {
            position: relative;
            background: #111827;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 520px;
        }
        .photo-viewer-media img {
            max-width: 100%;
            max-height: 86vh;
            object-fit: contain;
        }
        .photo-viewer-side {
            padding: 22px;
            overflow-y: auto;
            border-left: 1px solid var(--border-color);
        }
        .photo-viewer-year {
            font-family: 'Inter', sans-serif;
            color: var(--accent-primary);
            font-size: 30px;
            font-weight: 700;
            margin: 0 0 8px;
        }
        .photo-viewer-desc {
            color: var(--text-primary);
            line-height: 1.55;
            margin-bottom: 18px;
        }
        .photo-viewer-meta {
            display: grid;
            gap: 10px;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 18px;
        }
        .photo-viewer-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .photo-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: rgba(255,255,255,0.92);
            color: #111827;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .photo-nav-btn.prev { left: 14px; }
        .photo-nav-btn.next { right: 14px; }
        .photo-viewer-close {
            position: absolute;
            top: 14px;
            right: 14px;
            z-index: 2;
        }
        @media (max-width: 760px) {
            .sidebar {
                width: min(100vw - 48px, 420px);
            }
            .sidebar.hidden {
                transform: translateX(calc(-1 * min(100vw - 48px, 420px)));
            }
            .sidebar-content {
                padding: 16px;
                gap: 12px;
            }
            .sidebar-filter-row,
            .sidebar-filter-row.compact {
                grid-template-columns: 1fr;
            }
            .photos-list {
                gap: 12px;
            }
            .photo-viewer-layout { grid-template-columns: 1fr; }
            .photo-viewer-media { min-height: 320px; }
            .photo-viewer-side { border-left: none; border-top: 1px solid var(--border-color); }
        }

        .compare-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.9); z-index: 3000;
            justify-content: center; align-items: center; flex-direction: column;
        }
        .compare-container {
            position: relative; width: 80vw; height: 70vh; max-width: 900px;
            border-radius: 12px; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .compare-container img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain; user-select: none;
        }
        .compare-before { clip-path: inset(0 50% 0 0); z-index: 2; }
        .compare-slider {
            position: absolute; top: 0; bottom: 0; left: 50%; width: 2px;
            background: white; z-index: 10; cursor: ew-resize; transform: translateX(-50%);
        }
        .compare-slider::before {
            content: '↔'; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: white; color: black;
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }
        .compare-close {
            position: absolute; top: 20px; right: 20px; color: white;
            font-size: 32px; cursor: pointer; z-index: 20;
        }
        .compare-info { color: white; margin-top: 16px; font-size: 16px; font-weight: 500; }
        .compare-year { margin: 0 15px; }
        .compare-ai-info {
            color: rgba(255,255,255,0.82);
            margin-top: 8px;
            font-size: 13px;
            text-align: center;
            max-width: min(900px, 86vw);
            line-height: 1.5;
        }
        .compare-ai-score {
            color: #a7f3d0;
            font-weight: 700;
        }
        .filter-select {
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 8px center;
        background-size: 14px;
        padding-right: 30px;
        }
        h3 { margin: 4px 0 8px; }
        .photo-marker {
        border-radius: 50%;
        border: 2px solid white;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        object-fit: cover;

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
    console.log("🚀 Скрипт загружен");

    const photosCache = {};
    const photosDataCache = {};
    let currentUser = null;  // будет объект или null

    const locationPhotosModal = document.getElementById('locationPhotosModal');
    const locationPhotosTitle = document.getElementById('locationPhotosTitle');
    const locationPhotosSubtitle = document.getElementById('locationPhotosSubtitle');
    const locationPhotosGrid = document.getElementById('locationPhotosGrid');
    const downloadLocationPhotosBtn = document.getElementById('downloadLocationPhotosBtn');
    let currentLocationPhotos = [];

    function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, char => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        }[char]));
    }

    function safeFileName(value) {
        return String(value || 'photo').replace(/[\\/:*?"<>|]+/g, '-').replace(/\s+/g, '_').slice(0, 80);
    }

    async function downloadPhotoFile(photo) {
        const response = await fetch(photo.image);
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        const ext = (blob.type.split('/')[1] || 'jpg').replace('jpeg', 'jpg');
        link.href = url;
        link.download = `${safeFileName(photo.location_name)}_${photo.year}_${photo.id}.${ext}`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
    }

    const crcTable = (() => {
        const table = new Uint32Array(256);
        for (let n = 0; n < 256; n++) {
            let c = n;
            for (let k = 0; k < 8; k++) c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
            table[n] = c >>> 0;
        }
        return table;
    })();

    function crc32(bytes) {
        let crc = 0xffffffff;
        for (let i = 0; i < bytes.length; i++) crc = crcTable[(crc ^ bytes[i]) & 0xff] ^ (crc >>> 8);
        return (crc ^ 0xffffffff) >>> 0;
    }

    function writeString(view, offset, text) {
        for (let i = 0; i < text.length; i++) view.setUint8(offset + i, text.charCodeAt(i));
    }

    async function downloadPhotosZip(photos, archiveName) {
        const encoder = new TextEncoder();
        const files = [];
        for (const photo of photos) {
            const response = await fetch(photo.image);
            const blob = await response.blob();
            const bytes = new Uint8Array(await blob.arrayBuffer());
            const ext = (blob.type.split('/')[1] || 'jpg').replace('jpeg', 'jpg');
            files.push({
                name: `${safeFileName(photo.location_name)}_${photo.year}_${photo.id}.${ext}`,
                bytes,
                crc: crc32(bytes),
            });
        }

        const chunks = [];
        const central = [];
        let offset = 0;
        files.forEach(file => {
            const nameBytes = encoder.encode(file.name);
            const local = new ArrayBuffer(30 + nameBytes.length);
            const view = new DataView(local);
            view.setUint32(0, 0x04034b50, true);
            view.setUint16(4, 20, true);
            view.setUint16(8, 0, true);
            view.setUint32(14, file.crc, true);
            view.setUint32(18, file.bytes.length, true);
            view.setUint32(22, file.bytes.length, true);
            view.setUint16(26, nameBytes.length, true);
            new Uint8Array(local, 30).set(nameBytes);
            chunks.push(new Uint8Array(local), file.bytes);

            const centralHeader = new ArrayBuffer(46 + nameBytes.length);
            const centralView = new DataView(centralHeader);
            centralView.setUint32(0, 0x02014b50, true);
            centralView.setUint16(4, 20, true);
            centralView.setUint16(6, 20, true);
            centralView.setUint32(16, file.crc, true);
            centralView.setUint32(20, file.bytes.length, true);
            centralView.setUint32(24, file.bytes.length, true);
            centralView.setUint16(28, nameBytes.length, true);
            centralView.setUint32(42, offset, true);
            new Uint8Array(centralHeader, 46).set(nameBytes);
            central.push(new Uint8Array(centralHeader));
            offset += local.byteLength + file.bytes.length;
        });

        const centralSize = central.reduce((sum, chunk) => sum + chunk.length, 0);
        const end = new ArrayBuffer(22);
        const endView = new DataView(end);
        endView.setUint32(0, 0x06054b50, true);
        endView.setUint16(8, files.length, true);
        endView.setUint16(10, files.length, true);
        endView.setUint32(12, centralSize, true);
        endView.setUint32(16, offset, true);

        const zipBlob = new Blob([...chunks, ...central, new Uint8Array(end)], { type: 'application/zip' });
        const url = URL.createObjectURL(zipBlob);
        const link = document.createElement('a');
        link.href = url;
        link.download = safeFileName(archiveName || 'photos.zip').replace(/_zip$/, '.zip');
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
    }

    async function fetchAllResults(url) {
        const response = await fetch(url);
        if (!response.ok) throw new Error('Не удалось загрузить данные');
        const data = await response.json();
        if (!data || !Array.isArray(data.results)) return Array.isArray(data) ? data : (data.results || []);
        let results = [...data.results];
        let nextUrl = data.next;
        while (nextUrl) {
            const nextResponse = await fetch(nextUrl);
            if (!nextResponse.ok) throw new Error('Не удалось загрузить следующую страницу');
            const nextData = await nextResponse.json();
            results = results.concat(nextData.results || []);
            nextUrl = nextData.next;
        }
        return results;
    }

    async function openLocationPhotosModal(locId, locName) {
        locationPhotosTitle.textContent = locName || 'Фотографии локации';
        locationPhotosSubtitle.textContent = 'Загрузка фотографий...';
        locationPhotosGrid.innerHTML = '';
        locationPhotosModal.style.display = 'flex';

        try {
            let photos = photosDataCache[locId];
            if (!photos) {
                photos = await fetchAllResults(`/api/photos/?location=${locId}`);
                photosDataCache[locId] = photos;
            }

            const sorted = [...photos].sort((a, b) => Number(a.year || 0) - Number(b.year || 0));
            currentLocationPhotos = sorted;
            window.currentLocationPhotos = currentLocationPhotos;
            downloadLocationPhotosBtn.style.display = sorted.length ? 'inline-flex' : 'none';
            downloadLocationPhotosBtn.onclick = () => downloadPhotosZip(sorted, `${locName || 'location'}-photos.zip`);
            
            const compareLocationBtn = document.getElementById('compareLocationBtn');
            if (compareLocationBtn) {
                compareLocationBtn.style.display = sorted.length >= 2 ? 'inline-flex' : 'none';
                compareLocationBtn.onclick = () => openCompare(locId, locName);
            }

            locationPhotosSubtitle.textContent = sorted.length ? `Всего фотографий: ${sorted.length}` : 'Опубликованных фотографий пока нет';
            locationPhotosGrid.innerHTML = sorted.length ? sorted.map(photo => `
                <article class="location-photo-card" style="cursor:pointer;" onclick="showPhotoDetail(${photo.id}, window.currentLocationPhotos)">
                    <img src="${photo.image}" alt="${escapeHtml(photo.description || 'Фото локации')}" loading="lazy">
                    <div class="location-photo-info">
                        <div class="location-photo-year">${escapeHtml(photo.year)}</div>
                        <div>${escapeHtml(photo.description || 'Описание не добавлено')}</div>
                        <div class="location-photo-meta">
                            <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(photo.location_name || locName || '')}</span>
                            <span><i class="fas fa-compass"></i> ${photo.azimuth == null ? 'азимут не указан' : `${escapeHtml(photo.azimuth)}°`}</span>
                            <span><i class="fas fa-user"></i> ${escapeHtml(photo.owner_username || 'аноним')}</span>
                            <span><i class="fas fa-tag"></i> ${escapeHtml(photo.status_name || '')}</span>
                        </div>
                    </div>
                </article>
            `).join('') : `<div class="no-photos">Нет опубликованных фотографий</div>`;
        } catch (error) {
            currentLocationPhotos = [];
            window.currentLocationPhotos = currentLocationPhotos;
            downloadLocationPhotosBtn.style.display = 'none';
            locationPhotosSubtitle.textContent = 'Ошибка загрузки';
            locationPhotosGrid.innerHTML = `<div class="no-photos">${escapeHtml(error.message)}</div>`;
        }
    }

    function closeLocationPhotosModal() {
        locationPhotosModal.style.display = 'none';
    }

    function openCompareFromModal() {
        const locId = currentLocationPhotos[0]?.location;
        const locName = locationPhotosTitle.textContent;
        if (locId) {
            closeLocationPhotosModal();
            openCompare(locId, locName);
        }
    }

    locationPhotosModal.addEventListener('click', (event) => {
        if (event.target === locationPhotosModal) closeLocationPhotosModal();
    });

    const map = L.map('map').setView([57.6299, 39.8737], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors',
        referrerPolicy: 'origin'
    }).addTo(map);

    // --- ГЛОБАЛЬНЫЙ ПОИСК (твоя реализация) ---
    const osmSearchInput = document.getElementById('osmSearchInput');
    const osmSearchBtn = document.getElementById('osmSearchBtn');
    const osmResults = document.getElementById('osmSearchResults');
    let osmDebounce;
    let lastSearchData = []; 
    let isSearching = false;

    function goToResult(item) {
        if (!item) return;
        const lat = parseFloat(item.lat);
        const lon = parseFloat(item.lon);
        
        if (item.boundingbox) {
            const southWest = L.latLng(item.boundingbox[0], item.boundingbox[2]);
            const northEast = L.latLng(item.boundingbox[1], item.boundingbox[3]);
            const bounds = L.latLngBounds(southWest, northEast);
            map.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 });
        } else {
            map.flyTo([lat, lon], 15);
        }
        
        osmResults.style.display = 'none';
        osmSearchInput.value = item.name || item.display_name.split(',')[0];
    }

    function performOsmSearch(query, autoSelectFirst = false) {
        if (!query || query.length < 2) {
            osmResults.style.display = 'none';
            lastSearchData = [];
            return;
        }

        isSearching = true;
        const bounds = map.getBounds();
        const viewbox = `${bounds.getWest()},${bounds.getSouth()},${bounds.getEast()},${bounds.getNorth()}`;
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=10&addressdetails=1&viewbox=${viewbox}`;

        fetch(url)
            .then(response => response.json())
            .then(data => {
                isSearching = false;
                lastSearchData = data;
                osmResults.innerHTML = '';

                if (data.length === 0) {
                    osmResults.innerHTML = '<div class="osm-result-item">Ничего не найдено</div>';
                    osmResults.style.display = 'block';
                    return;
                }

                if (autoSelectFirst && data.length > 0) {
                    goToResult(data[0]);
                    return;
                }

                const uniqueResults = [];
                const seenNames = new Set();

                data.forEach(item => {
                    const key = `${item.name}_${item.type}`;
                    if (!seenNames.has(key)) {
                        seenNames.add(key);
                        uniqueResults.push(item);
                    }
                });

                uniqueResults.slice(0, 5).forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'osm-result-item';
                    
                    let typeLabel = item.type;
                    if(item.address.city || item.address.town) typeLabel = "Город";
                    else if(item.address.village) typeLabel = "Село";
                    else if(item.address.road) typeLabel = "Улица";
                    else if(item.address.suburb) typeLabel = "Район";
                    
                    div.innerHTML = `<span class="osm-result-type">${typeLabel}</span> ${item.display_name}`;
                    div.onclick = () => goToResult(item);
                    osmResults.appendChild(div);
                });
                osmResults.style.display = 'block';
            })
            .catch(err => {
                isSearching = false;
                console.error('OSM Search Error:', err);
            });
    }

    osmSearchInput.addEventListener('input', (e) => {
        clearTimeout(osmDebounce);
        lastSearchData = [];
        osmResults.style.display = 'none';
        osmDebounce = setTimeout(() => performOsmSearch(e.target.value), 500);
    });

    osmSearchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            const query = osmSearchInput.value.trim();
            if (isSearching) return;
            if (lastSearchData.length > 0) {
                goToResult(lastSearchData[0]);
            } else if (query.length >= 2) {
                performOsmSearch(query, true);
            }
        }
    });

    osmSearchBtn.addEventListener('click', () => {
        const query = osmSearchInput.value.trim();
        if (lastSearchData.length > 0) goToResult(lastSearchData[0]);
        else if (query.length >= 2) performOsmSearch(query, true);
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.osm-search-container')) {
            osmResults.style.display = 'none';
        }
    });

    // --- КЛАСТЕРНАЯ ГРУППА ---
    const markerCluster = L.markerClusterGroup({
        maxClusterRadius: 80,
        iconCreateFunction: function(cluster) {
            const count = cluster.getChildCount();
            let size = 'small', color = '#6366f1'; // Changed to Indigo
            if (count > 50) { size = 'large'; color = '#e74c3c'; }
            else if (count > 10) { size = 'medium'; color = '#f59e0b'; }
            return L.divIcon({
                html: `<div style="background:${color}; color:white; border-radius:50%; width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:14px;">${count}</div>`,
                className: `marker-cluster marker-cluster-${size}`,
                iconSize: L.point(40, 40)
            });
        }
    });
    map.addLayer(markerCluster);

    const markersMap = new Map();

    // ---- АВТОРИЗАЦИЯ И РЕГИСТРАЦИЯ ----
    const authContainer = document.getElementById('authContainer');
    const profileModal = document.getElementById('profileModal');
    const logoutConfirmModal = document.getElementById('logoutConfirmModal');
    const authModal = document.getElementById('authModal');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const loginError = document.getElementById('loginError');
    const registerError = document.getElementById('registerError');

    // Переключение вкладок
    loginTab.addEventListener('click', () => {
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
    });
    registerTab.addEventListener('click', () => {
        registerTab.classList.add('active');
        loginTab.classList.remove('active');
        loginForm.style.display = 'none';
        registerForm.style.display = 'block';
    });

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    function renderAuth() {
        if (currentUser) {
            let adminButtonsHtml = '';
            if (currentUser.is_admin) {

        let x = clientX - rect.left;
        x = Math.max(0, Math.min(x, rect.width));
        const percent = (x / rect.width) * 100;
        compareImgOld.style.clipPath = `inset(0 calc(100% - ${percent}%) 0 0)`;
        compareImgNew.style.clipPath = `inset(0 0 0 ${percent}%)`;
        compareSlider.style.left = percent + '%';

    async function resolveLocationMeta(locId) {
        if (locationMetaCache[locId]) return locationMetaCache[locId];
        const coords = locationCoords[locId];
        if (!coords) return { country: '', city: '' };
        try {
            const resp = await fetch(
                `https://nominatim.openstreetmap.org/reverse?format=json&lat=${coords.lat}&lon=${coords.lon}&accept-language=ru`
            );
            const data = await resp.json();
            const country = data.address?.country || '';
            let city = data.address?.city || data.address?.town || data.address?.village || '';
            // Очистка от административных приставок, чтобы не было «городской округ Ярославль»
            const prefixes = ['городской округ ', 'муниципальный район ', 'сельское поселение ', 'городское поселение ', 'район '];
            for (const p of prefixes) {
                if (city.toLowerCase().startsWith(p)) {
                    city = city.substring(p.length).trim();
                    if (city.length > 0) city = city[0].toUpperCase() + city.slice(1);
                    break;
                }
            }
            locationMetaCache[locId] = { country, city };
            return { country, city };
        } catch (e) {
            return { country: '', city: '' };
        }
    }

    // Заполнение выпадающих списков фильтров
    async function enrichAndPopulateFilters(photos) {
    // Соберем уникальные locId
    const locIds = new Set(photos.map(p => p.location).filter(Boolean));
    // Запросим метаданные для всех локаций (кэшируется)
    const promises = Array.from(locIds).map(id => resolveLocationMeta(id));
    await Promise.all(promises);

    // Собираем фильтры
    const types = new Set(photos.map(p => p.location_type_name || p.location_type).filter(Boolean));
    const years = new Set(photos.map(p => p.year).filter(Boolean));
    const countryMap = new Map(); // country -> Set of cities

    photos.forEach(p => {
        const meta = locationMetaCache[p.location] || { country: '', city: '' };
        if (meta.country) {
            if (!countryMap.has(meta.country)) countryMap.set(meta.country, new Set());
            if (meta.city) {
            const clean = meta.city.trim();
            if (clean) countryMap.get(meta.country).add(clean);
        }
        }
    });

    // Сохраняем структуру стран и городов
    allCountries = Array.from(countryMap.entries()).map(([country, cities]) => ({
        country,
        cities: Array.from(cities).sort()
    })).sort((a, b) => a.country.localeCompare(b.country));

    // Заполняем селекты
    const countrySelect = document.getElementById('filterCountry');
    const citySelect = document.getElementById('filterCity');
    const typeSelect = document.getElementById('filterType');
    const yearSelect = document.getElementById('filterYear');

    const savedCountry = countrySelect.value;
    const savedCity = citySelect.value;
    const savedType = typeSelect.value;
    const savedYear = yearSelect.value;

    // Страны
    countrySelect.innerHTML = '<option value="">🌍 Все страны</option>';
    allCountries.forEach(c => {
        countrySelect.innerHTML += `<option value="${c.country}">${c.country}</option>`;
    });
    countrySelect.value = savedCountry;

    // Города (зависят от выбранной страны)
    updateCityFilter();

    // Типы
    typeSelect.innerHTML = '<option value="">📂 Все типы</option>';
    [...types].sort().forEach(t => {
        typeSelect.innerHTML += `<option value="${t}">${t}</option>`;
    });
    typeSelect.value = savedType;

    // Годы
    yearSelect.innerHTML = '<option value="">📅 Все годы</option>';
    [...years].sort((a, b) => b - a).forEach(y => {
        yearSelect.innerHTML += `<option value="${y}">${y}</option>`;
    });
    yearSelect.value = savedYear;
}

    function updateCityFilter() {
        const country = document.getElementById('filterCountry').value;
        const citySelect = document.getElementById('filterCity');
        const savedCity = citySelect.value;
        citySelect.innerHTML = '<option value="">🏙️ Все города</option>';
        if (country) {
            const countryData = allCountries.find(c => c.country === country);
            if (countryData) {
                countryData.cities.forEach(city => {
                    citySelect.innerHTML += `<option value="${city}">${city}</option>`;
                });
            }
        } else {
            // Если страна не выбрана, показываем все уникальные города из всех стран
            const allCities = new Set();
            allCountries.forEach(c => c.cities.forEach(city => allCities.add(city)));
            Array.from(allCities).sort().forEach(city => {
                citySelect.innerHTML += `<option value="${city}">${city}</option>`;
            });
        }
        citySelect.value = savedCity;
    }

    // Обработчик изменения страны
    function onCountryChanged() {

    // Применение фильтров
    function applyFilters() {
    const typeFilter = document.getElementById('filterType').value;
    const yearFilter = document.getElementById('filterYear').value;
    const countryFilter = document.getElementById('filterCountry').value;
    const cityFilter = document.getElementById('filterCity').value;

    let filtered = allPhotos;
    if (currentFilterLocId) {
        filtered = filtered.filter(p => String(p.location) === String(currentFilterLocId));
    }
    if (typeFilter) {
        filtered = filtered.filter(p => (p.location_type_name || p.location_type) === typeFilter);
    }
    if (yearFilter) {
        filtered = filtered.filter(p => String(p.year) === yearFilter);
    }
    if (countryFilter || cityFilter) {
        filtered = filtered.filter(p => {
            const meta = locationMetaCache[p.location] || { country: '', city: '' };
            if (countryFilter && meta.country !== countryFilter) return false;
            if (cityFilter && meta.city !== cityFilter) return false;
            return true;
        });
    }
    renderPhotos(filtered);
}

    async function performLocSearch(query) {
        if (query.length < 2) {
            hideSearchResults();
            return;
        }
        try {
            const resp = await fetch(`/api/locations/?search=${encodeURIComponent(query)}`);
            if (!resp.ok) throw new Error('Search failed');
            const data = await resp.json();
            let features = [];
            if (data.results?.type === "FeatureCollection") features = data.results.features;
            else if (data.type === "FeatureCollection") features = data.features;
            else if (Array.isArray(data)) features = data;
            displayLocResults(features);
        } catch (err) {
            console.error('Loc search error:', err);
            hideSearchResults();
        }
    }

    searchInput.addEventListener('input', () => {
        clearTimeout(locDebounce);
        locDebounce = setTimeout(() => performLocSearch(searchInput.value.trim()), 300);
    });

    // Сброс фильтра при очистке поля вручную
    searchInput.addEventListener('keyup', (e) => {
        if (e.key === 'Escape' || searchInput.value === '') {
            currentFilterLocId = null;
            renderPhotos();
        }
    });

    // Закрытие поисковых подсказок при клике вне
    document.addEventListener('click', (e) => {
        if (!e.target.closest('#locSearchContainer')) {
            hideSearchResults();
        }
    });

    // Загрузка карты (маркеры и первичная загрузка фото)
    async function loadData() {
        try {
            const locResponse = await fetch('/api/locations/');
            if (!locResponse.ok) throw new Error(`API Локаций: ${locResponse.status}`);
            const rawData = await locResponse.json();
            let locations = [];
            if (rawData.results?.type === "FeatureCollection") locations = rawData.results.features;
            else if (rawData.type === "FeatureCollection") locations = rawData.features;
            else if (Array.isArray(rawData)) locations = rawData;

            console.log(`📍 Локаций найдено: ${locations.length}`);
            markerCluster.clearLayers();
            markersMap.clear();

            // Сохраняем координаты локаций для обратного геокодирования
            locations.forEach(feature => {
                const props = feature.properties || {};
                const locId = props.id || feature.id;
                if (feature.geometry && feature.geometry.coordinates) {
                    const [lon, lat] = feature.geometry.coordinates;
                    locationCoords[locId] = { lat, lon };
                }
            });

            locations.forEach(feature => {
                let geometry = feature.geometry;
                if (!geometry && feature.coordinates) geometry = { type: "Point", coordinates: feature.coordinates };
                if (!geometry?.coordinates) return;
                const coordsLeaflet = [geometry.coordinates[1], geometry.coordinates[0]];
                const props = feature.properties || {};
                const locId = props.id || feature.id;
                const locName = props.name || "Без названия";
                if (!locId) return;

                const oldestPhotoUrl = feature.properties?.oldest_photo_url;
                let markerIcon;
                if (oldestPhotoUrl) {
                    markerIcon = L.icon({
                        iconUrl: oldestPhotoUrl,
                        iconSize: [48, 48],
                        iconAnchor: [24, 48],
                        popupAnchor: [0, -48],
                        className: 'photo-marker'
                    });
                } else {
                    markerIcon = new L.Icon.Default();
                }
                const marker = L.marker(coordsLeaflet, { icon: markerIcon });
                markerCluster.addLayer(marker);
                markersMap.set(String(locId), marker);

                marker.bindPopup(`
                    <div class="popup-content" id="popup-${locId}">
                        <b>${locName}</b><br>
                        <div class="popup-photos"><em>Загрузка фото...</em></div>
                        <div class="popup-actions" style="display:flex; justify-content:center; gap:5px; flex-wrap:wrap;">
                            <button class="btn-add" onclick="openUploadModal(${locId}, '${locName.replace(/'/g, "\\'")}')">+ Добавить фото</button>
                            <button class="btn-compare" id="compareBtn-${locId}" style="display:none;" onclick="openCompare(${locId}, '${locName.replace(/'/g, "\\'")}')">⇔ Сравнить</button>
                        </div>
                    </div>
                `);

                marker.on('click', () => {
                    setTimeout(() => map.closePopup(), 0);
                    openLocationPhotosModal(locId, locName);
                });

                marker.on('popupopen', async () => {
                    const container = document.getElementById(`popup-${locId}`);
                    if (!container) return;
                    const galleryDiv = container.querySelector('.popup-photos');
                    const compareBtn = container.querySelector(`#compareBtn-${locId}`);
                    if (photosCache[locId]) {
                        galleryDiv.innerHTML = photosCache[locId];
                        compareBtn.style.display = (photosDataCache[locId]?.length >= 2) ? 'inline-block' : 'none';
                        return;
                    }
                    try {
                        const photosResp = await fetch(`/api/photos/?location=${locId}`);
                        if (!photosResp.ok) throw new Error('Ошибка загрузки');
                        const photosData = await photosResp.json();
                        const photos = Array.isArray(photosData) ? photosData : (photosData.results || []);
                        photosDataCache[locId] = photos;
                        let html = '';
                        if (photos.length === 0) {
                            html = '<em>Нет опубликованных фото</em>';
                            compareBtn.style.display = 'none';
                        } else {
                            html = '<div class="popup-gallery">';
                            photos.forEach(photo => {
                                html += `<div class="popup-gallery-item">
                                    <img src="${photo.image}" class="popup-img" loading="lazy">
                                    <div class="popup-year">${photo.year}</div>
                                    ${photo.description ? `<div class="popup-desc">${photo.description}</div>` : ''}
                                </div>`;
                            });
                            html += '</div>';
                            compareBtn.style.display = photos.length >= 2 ? 'inline-block' : 'none';
                        }
                        photosCache[locId] = html;
                        galleryDiv.innerHTML = html;
                    } catch (err) {
                        galleryDiv.innerHTML = '<em>Ошибка загрузки фото</em>';
                        compareBtn.style.display = 'none';
                    }
                });
            });
            markerCluster.refreshClusters();
        } catch (error) {
            console.error("❌ Ошибка загрузки карты:", error);
        }

        // Загружаем все фото для панели
        await loadAllPhotos();
        renderPhotos();
    }

const addPhotoBtn = document.getElementById('addPhotoBtn');
const addPhotoModal = document.getElementById('addPhotoModal');

function openAddPhotoModal() {
    if (!currentUser) {
        alert('Необходимо войти в систему');

    }
    const html = `
        <h3>Добавить фотографию</h3>

        <div class="form-group">

        clearTimeout(searchTimeout);
        const query = locSearchInput.value.trim();
        if (query.length < 2) {
            locSearchResults.innerHTML = '';
            return;
        }
        searchTimeout = setTimeout(async () => {
            const resp = await fetch(`/api/locations/?search=${encodeURIComponent(query)}`);
            const data = await resp.json();
            let features = [];
            if (data.results?.features) features = data.results.features;
            else if (data.features) features = data.features;
            else if (Array.isArray(data)) features = data;
            locSearchResults.innerHTML = features.slice(0, 5).map(loc => {
                const props = loc.properties || {};
                const locId = props.id || loc.id;
                const locName = props.name || 'Без названия';
                if (!locId) return '';
                return `<div class="search-result-item" style="padding:8px;" data-locid="${locId}" data-locname="${locName.replace(/"/g, '&quot;')}">${locName}</div>`;
            }).filter(Boolean).join('');

            document.querySelectorAll('#locSearchResults .search-result-item').forEach(item => {
                item.addEventListener('click', function() {
                    const id = this.dataset.locid;
                    const name = this.dataset.locname;
                    if (id) {
                        selectExistingLocation(Number(id), name);
                    }
                });
            });
        }, 300);
    });

    document.getElementById('createNewLocBtn').addEventListener('click', startNewLocationProcess);
}

function selectExistingLocation(id, name) {
    const numericId = Number(id);
    if (!numericId || isNaN(numericId)) {
        alert('Ошибка: некорректный ID локации.');
        return;
    }
    hideAddPhotoModal();
    openUploadFormForLocation(numericId, name);
}

function startNewLocationProcess() {
    hideAddPhotoModal();
    alert('Кликните на карте, чтобы установить точку для новой локации.');
    map.once('click', async function(e) {
        const lat = e.latlng.lat;
        const lng = e.latlng.lng;
        try {
            const checkResp = await fetch(`/api/locations/check/?lat=${lat}&lng=${lng}`);
            const checkData = await checkResp.json();
            if (checkData.nearby && checkData.nearby.length > 0) {
                const nearbyNames = checkData.nearby.map(loc => loc.name).join(', ');
                alert(`Рядом уже есть: ${nearbyNames}. Пожалуйста, выберите одну из существующих точек.`);
                return;  // Просто выходим, не создаём новую
            }
        } catch (err) {
            // Если сервер не ответил, продолжаем
        }
        const name = prompt('Введите название локации:');
        if (!name) return;
        const createResp = await fetch('/api/locations/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
            body: JSON.stringify({
                name: name,
                coordinates: { type: 'Point', coordinates: [lng, lat] }
            })
        });
        const newLocation = await createResp.json();
        if (newLocation.id) {
            openUploadFormForLocation(Number(newLocation.id), newLocation.name || name);
        } else {
            alert('Ошибка создания локации. Возможно, такое название уже существует.');
        }
    });
}

function openUploadFormForLocation(locId, locName) {
    locId = Number(locId);
    if (isNaN(locId)) {
        alert('Некорректный ID локации');
        return;
    }

    const html = `
        <h3>Загрузить фото для «${locName}»</h3>
        <div class="form-group"><label>Год съёмки</label><input type="number" class="form-control" id="photoYear" required></div>
        <div class="form-group"><label>Фотография</label><input type="file" class="form-control" id="photoImage" accept="image/*" required></div>
        <div class="form-group"><label>Описание</label><textarea class="form-control" id="photoDesc" rows="3"></textarea></div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="hideAddPhotoModal()">Отмена</button>
            <button class="btn btn-primary" id="submitPhoto">Загрузить</button>
        </div>
    `;
    showAddPhotoModal(html);
    document.getElementById('submitPhoto').addEventListener('click', async () => {
        const year = document.getElementById('photoYear').value;
        const image = document.getElementById('photoImage').files[0];
        const desc = document.getElementById('photoDesc').value;
        if (!year || !image) {
            alert('Заполните обязательные поля');
            return;
        }
        const formData = new FormData();
        formData.append('year', year);
        formData.append('image', image);
        formData.append('description', desc);
        formData.append('location', locId);

        try {
            const resp = await fetch('/api/photos/', {
                method: 'POST',
                headers: { 'X-CSRFToken': getCookie('csrftoken') },
                body: formData
            });
            if (resp.ok) {
                alert('Фото отправлено на модерацию!');
                hideAddPhotoModal();
                await loadAllPhotos();
                renderPhotos();
                await loadData();
            } else {
                const err = await resp.json();
                alert('Ошибка: ' + JSON.stringify(err));
            }
        } catch (e) {
            alert('Ошибка сети');
        }
    });
}

    addPhotoBtn.addEventListener('click', openAddPhotoModal);
    updateAddPhotoButton();

let currentDetailPhotos = [];

    const source = Array.isArray(collection) && collection.length ? collection : (lastRenderedPhotos.length ? lastRenderedPhotos : allPhotos);
    currentDetailPhotos = source.filter(Boolean);

function renderPhotoDetail() {

function showAdjacentPhoto(direction) {
    if (!currentDetailPhotos.length) return;
    currentDetailIndex = (currentDetailIndex + direction + currentDetailPhotos.length) % currentDetailPhotos.length;
    renderPhotoDetail();
}
